<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service Details</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">


    <link rel="stylesheet" href="../style.css">
  </head>
  <body>

  	<div id="gear"> </div>

  	<div id="user">
      <div class="horizontal">
        <div class="icon-medium">
          <span class="material-icons" style="font-size: 32px;">person</span>
        </div>

        <div class="vertical" style="margin-left: 10px;">
          <h4 id="garageName"></h4>
          <p id="garageDesc"></p>
        </div>
      </div>


      <div class="title-bar">
        <h4>Vehicle Service History</h4>
      </div>

      <div class="title-bar">
        <div style="display: flex; width: 100%; margin-bottom: 10px; align-items: center;">
          <div class="vertical" style="flex: 4; padding-left: 10px;">
            <p style="font-size: 16px;" id="customerName" > </p>
            <p id="customerAddress"></p>
          </div>

          <div class="vertical" style="flex: 1;">
            <div class="credit-text" style="font-size: 18px;" id="creditText"></div>
            <div class="balance-text" style="font-size: 18px;" id="balanceText"></div>
          </div>
		</div>
      </div>

  	</div>

    <div id="vehicleList"></div>

    <script type="module" src="script.js"></script>

  </body>
</html>
